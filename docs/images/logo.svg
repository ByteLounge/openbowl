<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="100%" height="100%">
  <defs>
    <!-- Deep blue-black premium gradient -->
    <linearGradient id="blueBlackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Outer Outline Path (Deep Blue-Black) -->
    <path d="M 40,40 L 180,40 C 180,130 160,150 110,150 C 60,150 40,130 40,40 Z" 
          fill="url(#blueBlackGrad)" 
          stroke="#0f172a" 
          stroke-width="8" 
          stroke-linejoin="round" />

    <!-- Thin White Separating Line Path -->
    <path d="M 45,45 L 175,45 C 175,123 158,142 110,142 C 62,142 45,123 45,45 Z" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="2" 
          stroke-linejoin="round" />

    <!-- Inner Bowl Accent / Core (Deep Blue-Black) -->
    <path d="M 52,52 L 168,52 C 168,115 152,132 110,132 C 68,132 52,115 52,52 Z" 
          fill="#0f172a" />
          
    <!-- Decorative Rim Accent inside the bowl -->
    <line x1="60" y1="65" x2="160" y2="65" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.3" />

    <!-- Text: OPENBOWL -->
    <text x="210" y="110" 
          font-family="Outfit, -apple-system, sans-serif" 
          font-size="64" 
          font-weight="800" 
          letter-spacing="4" 
          fill="url(#blueBlackGrad)"
          stroke="#ffffff"
          stroke-width="1.5"
          paint-order="stroke fill">OPENBOWL</text>

    <!-- Subtitle: Universal Context Layer -->
    <text x="212" y="140" 
          font-family="Outfit, -apple-system, sans-serif" 
          font-size="16" 
          font-weight="500" 
          letter-spacing="2" 
          fill="#64748b">UNIVERSAL CONTEXT LAYER</text>
  </g>
</svg>
