<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0b0f19;
      color: #f3f4f6;
      margin: 0;
    }
    h3 {
      font-size: 14px;
      margin-top: 0;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #9ca3af;
      padding-bottom: 12px;
      border-bottom: 1px solid #1f2937;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .dot-online { background-color: #10b981; }
    .dot-offline { background-color: #ef4444; }
    
    label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      display: block;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 8px;
      color: #ffffff;
      font-size: 13px;
      outline: none;
      margin-bottom: 14px;
    }
    input:focus {
      border-color: #8b5cf6;
    }
    button {
      width: 100%;
      background-color: #8b5cf6;
      color: #ffffff;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #7c3aed;
    }
  </style>
</head>
<body>
  <h3>🥣 OpenBowl Context</h3>
  
  <div class="status-bar">
    <span>Connection Status:</span>
    <span id="conn-text"><span class="dot dot-offline"></span>Offline</span>
  </div>

  <label for="proj-id">Active Project ID</label>
  <input type="text" id="proj-id" placeholder="proj-core-default">

  <button id="save-btn">Save Configurations</button>

  <script src="popup.js"></script>
</body>
</html>
