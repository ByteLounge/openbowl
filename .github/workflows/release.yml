name: Release Desktop Installers 🚀

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            target: x86_64-unknown-linux-gnu
            binary_name: server-x86_64-unknown-linux-gnu
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            binary_name: server-aarch64-apple-darwin
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            binary_name: server-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Set up Node.js & Web Frontend Dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 18
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      # 2. Set up Go & Compile Core Sidecar Binary
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: packages/core/go.sum

      - name: Create binaries directory
        run: mkdir -p apps/desktop/src-tauri/binaries
        shell: bash

      - name: Compile Go Server Sidecar (Linux / macOS)
        if: matrix.platform != 'windows'
        run: |
          go build -ldflags="-w -s" -o apps/desktop/src-tauri/binaries/${{ matrix.binary_name }} packages/core/cmd/server/main.go
        shell: bash

      - name: Compile Go Server Sidecar (Windows)
        if: matrix.platform == 'windows'
        run: |
          go build -ldflags="-w -s" -o apps/desktop/src-tauri/binaries/${{ matrix.binary_name }} packages/core/cmd/server/main.go
        shell: pwsh

      # 3. Set up Rust for Tauri compiler
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # 4. Install Linux WebKit dependencies (Ubuntu only)
      - name: Install WebKit2Gtk (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libsoup2.4-dev build-essential curl wget libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # 5. Build Desktop Tauri Application
      - name: Run Tauri Builder
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'OpenBowl v__VERSION__'
          releaseBody: 'Universal Context Layer release.'
          releaseDraft: true
          prerelease: false
          projectPath: apps/desktop
